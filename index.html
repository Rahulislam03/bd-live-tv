<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV | Ultra Premium</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            /* Premium Midnight Gold Theme */
            --primary: #ffcc00; /* Luxury Gold */
            --bg: #0d0d0d;      /* Deep Black */
            --surface: #1a1a1a; /* Charcoal Gray */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --gradient: linear-gradient(135deg, #ffcc00, #ff9500);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            scroll-behavior: smooth;
        }

        /* --- Header --- */
        header {
            height: 75px; background: rgba(13, 13, 13, 0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 6%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #222;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; cursor: pointer; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }

        /* --- Search Bar --- */
        .search-container {
            background: #1f1f1f; border-radius: 50px; padding: 10px 20px;
            display: flex; align-items: center; border: 1px solid #333; width: 35%;
            transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 204, 0, 0.1); }
        .search-container input {
            background: transparent; border: none; color: white; outline: none;
            margin-left: 10px; width: 100%; font-size: 14px;
        }

        /* --- Main Player --- */
        .player-wrapper {
            width: 100%; background: linear-gradient(to bottom, #111, #0d0d0d); padding: 30px 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .video-canvas {
            width: 90%; max-width: 1100px; aspect-ratio: 16/9;
            background: #000; border-radius: 25px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255, 204, 0, 0.05);
            border: 1px solid #282828; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* --- Watermark --- */
        .watermark {
            margin-top: 20px; font-size: 13px; color: var(--text-dim);
            background: rgba(255, 255, 255, 0.05); padding: 8px 20px;
            border-radius: 50px; letter-spacing: 1px;
            border: 1px solid rgba(255, 204, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        /* --- Gallery Grid --- */
        .gallery-title {
            padding: 40px 6% 20px; font-size: 22px; font-weight: 700;
            display: flex; align-items: center; gap: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .grid {
            display: grid; padding: 0 6% 60px;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--surface); border-radius: 22px; padding: 25px 15px;
            text-align: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #252525; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gradient); opacity: 0; transition: 0.3s; z-index: 0;
        }
        .card:hover {
            transform: translateY(-10px); background: #222;
            border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .card img {
            width: 85px; height: 85px; object-fit: contain;
            margin-bottom: 15px; border-radius: 18px; position: relative; z-index: 1;
            background: #0d0d0d; padding: 10px; border: 1px solid #333;
        }
        .card span { 
            display: block; font-size: 15px; font-weight: 600; color: #eee; 
            position: relative; z-index: 1;
        }

        .card.active {
            border-color: var(--primary); background: rgba(255, 204, 0, 0.08);
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.15);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Mobile View */
        @media (max-width: 768px) {
            header { padding: 0 4%; }
            .search-container { display: none; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 4% 50px; }
            .card { padding: 20px 10px; }
            .card img { width: 65px; height: 65px; }
            .video-canvas { width: 95%; border-radius: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">BD LIVE<span>TV</span></div>
    <div class="search-container">
        <i class="fas fa-search" style="color: #555;"></i>
        <input type="text" id="find" placeholder="পছন্দের চ্যানেলটি খুঁজুন..." onkeyup="search()">
    </div>
    <div class="header-icons"><i class="fas fa-crown" style="color: var(--primary);"></i></div>
</header>

<section class="player-wrapper">
    <div class="video-canvas">
        <video id="tv" controls autoplay playsinline poster="https://files.catbox.moe/k8u7t5.jpg"></video>
    </div>
    <div class="watermark">
        <i class="fas fa-check-circle" style="color: var(--primary);"></i> Official Stream by <b>@rahulislam03</b>
    </div>
</section>

<div class="gallery-title">
    <i class="fas fa-bolt" style="color: var(--primary);"></i> LIVE CHANNELS
</div>

<div class="grid" id="main-gallery">
    </div>

<script>
    // তোমার M3U লিঙ্কে ১০০+ চ্যানেল থাকলে এখানে সব আসবে
    const m3uUrl = 'https://raw.githubusercontent.com/Rahulislam03/bd-live-tv/main/live_tv.m3u';
    const videoPlayer = document.getElementById('tv');
    const gallery = document.getElementById('main-gallery');
    let hls = new Hls();

    async function load() {
        try {
            const res = await fetch(m3uUrl);
            const text = await res.text();
            const lines = text.split('\n');
            gallery.innerHTML = '';

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('#EXTINF:')) {
                    // নাম সংগ্রহ
                    const infoLine = lines[i];
                    const name = infoLine.split(',')[1]?.trim() || "Unknown Channel";
                    
                    // লিঙ্ক সংগ্রহ
                    let url = "";
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j].trim() && !lines[j].startsWith('#')) {
                            url = lines[j].trim();
                            break;
                        }
                    }

                    // লোগো সংগ্রহ (tvg-logo ট্যাগ থেকে)
                    let logo = "https://cdn-icons-png.flaticon.com/512/716/716429.png";
                    if(infoLine.includes('tvg-logo="')) {
                        logo = infoLine.split('tvg-logo="')[1].split('"')[0];
                    }

                    if(url && url.startsWith('http')) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${logo}" alt="${name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'">
                            <span>${name}</span>
                        `;
                        card.onclick = () => play(url, name, card);
                        gallery.appendChild(card);
                    }
                }
            }
        } catch (e) { 
            gallery.innerHTML = "<p style='color:red; padding: 20px;'>Error: চ্যানেল লোড করা সম্ভব হয়নি।</p>"; 
        }
    }

    function play(url, name, el) {
        // Player setup
        const config = {
            xhrSetup: xhr => xhr.setRequestHeader("User-Agent", "Toffee (Linux;Android 14)")
        };

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls(config);
            hls.loadSource(url);
            hls.attachMedia(videoPlayer);
            hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
            videoPlayer.src = url;
            videoPlayer.play();
        }

        // UI Update
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function search() {
        let val = document.getElementById('find').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            const name = c.querySelector('span').innerText.toLowerCase();
            c.style.display = name.includes(val) ? "block" : "none";
        });
    }

    load();
</script>

</body>
                                                                          </html>
