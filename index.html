<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV | RAHUL</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        header { padding: 15px; border-bottom: 2px solid #ffcc00; }
        .video-container { width: 95%; max-width: 800px; margin: 20px auto; background: #111; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #ffcc00; transform: scale(1.05); }
        .card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .card p { margin: 0; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>BD LIVE <span style="color:#ffcc00">TV</span></h1></header>
    <div class="video-container"><video id="video" controls autoplay playsinline></video></div>
    <div class="grid" id="container"></div>

    <script>
        const video = document.getElementById('video');
        const container = document.getElementById('container');
        let hls = new Hls();

        async function loadChannels() {
            try {
                const res = await fetch('channels.json');
                const data = await res.json();
                data.channels.forEach(ch => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;
                    div.onclick = () => play(ch.url);
                    container.appendChild(div);
                });
            } catch (e) { console.error("Error loading JSON"); }
        }

        function play(url) {
            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls({ xhrSetup: xhr => xhr.setRequestHeader("User-Agent", "Toffee (Linux;Android 14)") });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
        loadChannels();
    </script>
</body>
</html>
