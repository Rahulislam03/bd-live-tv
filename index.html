<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV | 24/7 Home of Entertainment</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000; /* Red theme for BD Live */
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(255,0,0,0.1), transparent);
        }

        .logo {
            font-size: 35px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .search-container {
            max-width: 600px;
            margin: 20px auto 0;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass);
            background: var(--glass);
            color: white;
            backdrop-filter: blur(10px);
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        /* Player with Watermark */
        .player-wrapper {
            position: relative;
            width: 95%;
            max-width: 1000px;
            margin: 0 auto 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid var(--glass);
            aspect-ratio: 16/9;
        }

        video { width: 100%; height: 100%; background: #000; }

        .watermark {
            position: absolute;
            top: 15px;
            right: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        /* Channel Grid with Large Images */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 50px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            padding-left: 10px;
            border-left: 5px solid var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.15);
        }

        .card img {
            width: 100%;
            height: 100px;
            object-fit: contain; /* ইমেজের রেশিও ঠিক রাখবে */
            margin-bottom: 15px;
            border-radius: 10px;
            background: #111;
            padding: 10px;
        }

        .card p {
            margin: 0;
            font-size: 15px;
            font-weight: 500;
            color: #ddd;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .logo { font-size: 28px; }
            .card img { height: 80px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">BD LIVE <span>TV</span></div>
    <div class="search-container">
        <input type="text" id="search" class="search-bar" placeholder="চ্যানেল বা মুভি খুঁজুন...">
    </div>
</header>

<div class="player-wrapper">
    <div class="watermark">@rahulislam03</div>
    <video id="video" controls autoplay playsinline poster="https://i.ibb.co/3S9f4XN/loading.png"></video>
</div>

<div class="container">
    <div class="section-title">All Channels</div>
    <div id="loading" style="text-align: center; color: #888;">লোডিং হচ্ছে...</div>
    <div class="grid" id="channelGrid"></div>
</div>

<script>
    const video = document.getElementById('video');
    const grid = document.getElementById('channelGrid');
    const search = document.getElementById('search');
    const loading = document.getElementById('loading');
    let hls = new Hls();
    let channels = [];

    async function loadData() {
        try {
            const res = await fetch('channels.json');
            const data = await res.json();
            channels = data.channels;
            loading.style.display = 'none';
            render(channels);
        } catch (e) {
            loading.innerText = "Error: channels.json ফাইলটি পাওয়া যায়নি!";
        }
    }

    function render(list) {
        grid.innerHTML = "";
        list.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${ch.logo || 'https://cdn-icons-png.flaticon.com/512/716/716429.png'}" alt="${ch.name}" loading="lazy">
                <p>${ch.name}</p>
            `;
            card.onclick = () => playStream(ch.url);
            grid.appendChild(card);
        });
    }

    function playStream(url) {
        if (hls) hls.destroy();
        const config = { xhrSetup: xhr => xhr.setRequestHeader("User-Agent", "Toffee") };

        if (Hls.isSupported()) {
            hls = new Hls(config);
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    search.oninput = (e) => {
        const val = e.target.value.toLowerCase();
        render(channels.filter(c => c.name.toLowerCase().includes(val)));
    };

    loadData();
</script>
</body>
</html>
