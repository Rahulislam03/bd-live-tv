<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TV | 24/7 Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Hero Header */
        header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .logo span {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass);
            background: var(--glass);
            color: white;
            backdrop-filter: blur(10px);
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        /* Player Section with Watermark */
        .player-wrapper {
            position: relative;
            width: 95%;
            max-width: 1000px;
            margin: -20px auto 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass);
            aspect-ratio: 16/9;
        }

        .main-player {
            width: 100%;
            height: 100%;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Watermark Styles */
        .watermark {
            position: absolute;
            top: 15px;
            right: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            font-weight: 400;
            pointer-events: none; /* যাতে ভিডিও কন্ট্রোলে সমস্যা না হয় */
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            letter-spacing: 1px;
        }

        /* Content Grid */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 50px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: scale(1.08);
            background: var(--glass);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }

        .card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .card p {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: #efefef;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .logo { font-size: 24px; }
            .watermark { font-size: 11px; top: 10px; right: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Sudu <span>LIVE TV</span></div>
    <div class="search-container">
        <input type="text" id="search" class="search-bar" placeholder="Search Channels, Movies or News...">
    </div>
</header>

<div class="player-wrapper">
    <div class="main-player">
        <div class="watermark">@rahulislam03</div>
        <video id="video" controls autoplay playsinline poster="https://i.ibb.co/3S9f4XN/loading.png"></video>
    </div>
</div>

<div class="container">
    <div class="section-title">Explore Channels</div>
    <div class="grid" id="channelGrid"></div>
</div>

<script>
    const video = document.getElementById('video');
    const grid = document.getElementById('channelGrid');
    const search = document.getElementById('search');
    let hls = new Hls();
    let channels = [];

    // Load Data
    async function loadData() {
        try {
            const res = await fetch('channels.json');
            const data = await res.json();
            channels = data.channels;
            render(channels);
        } catch (e) {
            console.error("Failed to load channels.json");
        }
    }

    function render(list) {
        grid.innerHTML = "";
        list.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${ch.logo || 'https://cdn-icons-png.flaticon.com/512/716/716429.png'}" loading="lazy">
                <p>${ch.name}</p>
            `;
            card.onclick = () => playStream(ch.url);
            grid.appendChild(card);
        });
    }

    function playStream(url) {
        if (hls) hls.destroy();
        const config = {
            xhrSetup: xhr => xhr.setRequestHeader("User-Agent", "Toffee (Linux;Android 14)")
        };

        if (Hls.isSupported()) {
            hls = new Hls(config);
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Live Search
    search.oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(val));
        render(filtered);
    };

    loadData();
</script>

</body>
            </html>
