<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV | Gallery View</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0a;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- Layout Structures --- */
        header {
            height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222;
        }

        .main-player {
            width: 100%; background: #000; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .video-box {
            width: 90%; max-width: 1000px; aspect-ratio: 16/9;
            background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1); border: 1px solid #333;
        }
        video { width: 100%; height: 100%; }

        /* --- Gallery Grid System --- */
        .gallery-container {
            padding: 40px 5%;
        }

        .section-title {
            font-size: 22px; font-weight: bold; margin-bottom: 25px;
            display: flex; align-items: center; gap: 10px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background: var(--surface); border-radius: 15px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
            border: 1px solid #222; position: relative; overflow: hidden;
        }

        .channel-card:hover {
            transform: translateY(-10px); background: #1a1a1a;
            border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .channel-card img {
            width: 80px; height: 80px; object-fit: contain;
            margin-bottom: 15px; border-radius: 12px;
            background: #080808; padding: 10px;
        }

        .channel-card span {
            display: block; font-size: 14px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .channel-card.active {
            border-color: var(--primary); background: rgba(0, 255, 136, 0.05);
        }
        .channel-card.active::after {
            content: "PLAYING"; position: absolute; top: 0; right: 0;
            background: var(--primary); color: #000; font-size: 10px;
            padding: 2px 8px; font-weight: bold; border-bottom-left-radius: 10px;
        }

        /* --- Search Bar --- */
        .search-area {
            background: var(--glass); border: 1px solid #333; padding: 10px 20px;
            border-radius: 30px; display: flex; align-items: center; width: 300px;
        }
        .search-area input {
            background: transparent; border: none; color: white; outline: none; margin-left: 10px; width: 100%;
        }

        @media (max-width: 600px) {
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
            .channel-card img { width: 50px; height: 50px; }
            .search-area { width: 150px; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: 900; color: var(--primary);">BD LIVE <span style="color: white;">TV</span></div>
    <div class="search-area">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search channel..." onkeyup="searchChannel()">
    </div>
</header>

<section class="main-player">
    <div class="video-box">
        <video id="player" controls autoplay poster="https://files.catbox.moe/k8u7t5.jpg"></video>
    </div>
    <div style="text-align: center; margin-top: 15px;">
        <h2 id="now-playing" style="margin: 0; color: var(--primary);">Welcome to BD LIVE TV</h2>
        <p style="color: #666; font-size: 14px;">Select a channel from the gallery below to start streaming</p>
    </div>
</section>

<section class="gallery-container">
    <div class="section-title">
        <i class="fas fa-th-large" style="color: var(--primary);"></i> সকল চ্যানেল সমাহার
    </div>
    <div class="channel-grid" id="gallery">
        </div>
</section>

<script>
    const m3uUrl = 'https://raw.githubusercontent.com/Rahulislam03/bd-live-tv/main/live_tv.m3u';
    const video = document.getElementById('player');
    const gallery = document.getElementById('gallery');
    const nowPlaying = document.getElementById('now-playing');
    let hls = new Hls();

    async function loadGallery() {
        try {
            const res = await fetch(m3uUrl);
            const data = await res.text();
            const lines = data.split('\n');
            gallery.innerHTML = '';

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('#EXTINF:')) {
                    const info = lines[i];
                    const name = info.split(',')[1]?.trim() || "Unknown";
                    const url = lines[i + 1]?.trim();

                    // Extract Logo
                    let logo = "https://cdn-icons-png.flaticon.com/512/716/716429.png";
                    if(info.includes('tvg-logo=')) {
                        logo = info.split('tvg-logo="')[1].split('"')[0];
                    }

                    if(url && url.startsWith('http')) {
                        const card = document.createElement('div');
                        card.className = 'channel-card';
                        card.innerHTML = `
                            <img src="${logo}" alt="${name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'">
                            <span>${name}</span>
                        `;
                        card.onclick = () => playChannel(url, name, card);
                        gallery.appendChild(card);
                    }
                }
            }
        } catch (e) {
            gallery.innerHTML = "<p>চ্যানেল লোড করতে সমস্যা হচ্ছে!</p>";
        }
    }

    function playChannel(url, name, element) {
        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }

        nowPlaying.innerText = "Playing: " + name;
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function searchChannel() {
        let filter = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.querySelectorAll('.channel-card');
        cards.forEach(card => {
            let name = card.innerText.toLowerCase();
            card.style.display = name.includes(filter) ? "block" : "none";
        });
    }

    loadGallery();
</script>

</body>
</html>
