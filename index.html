<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV | Premium Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #006a4e; --accent: #f42a41; --bg: #050505; --surface: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        header { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 24px; font-weight: bold; color: white; }
        .logo span { color: var(--accent); }
        .live-dot { height: 10px; width: 10px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
        .container { display: flex; height: calc(100vh - 60px); }
        .player-section { flex: 3; background: #000; padding: 20px; display: flex; flex-direction: column; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; height: 100%; }
        .sidebar { flex: 1; background: var(--surface); border-left: 1px solid #222; overflow-y: auto; padding: 10px; }
        .channel-card { display: flex; align-items: center; padding: 15px; background: #1a1a1a; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .channel-card:hover { border-color: var(--primary); background: #222; }
        .channel-card.active { background: var(--primary); }
        .channel-card i { margin-right: 12px; color: var(--accent); }
        .active i { color: white; }
        @media (max-width: 800px) { .container { flex-direction: column; } .sidebar { height: 400px; } body { overflow: auto; } }
    </style>
</head>
<body>
    <header>
        <div class="logo"><div class="live-dot"></div>BD LIVE <span>TV</span></div>
    </header>
    <div class="container">
        <div class="player-section">
            <div class="video-wrapper">
                <video id="video" controls autoplay></video>
            </div>
            <h2 id="title" style="margin-top:15px;">Channel Load Korun</h2>
        </div>
        <div class="sidebar" id="playlist">Loading...</div>
    </div>
    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/Rahulislam03/Bangladeshi-live-tv/main/live_tv.m3u';
        const video = document.getElementById('video');
        const playlist = document.getElementById('playlist');
        async function init() {
            const res = await fetch(m3uUrl);
            const data = await res.text();
            const lines = data.split('\n');
            playlist.innerHTML = '';
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1].trim();
                    const div = document.createElement('div');
                    div.className = 'channel-card';
                    div.innerHTML = `<i class="fas fa-play-circle"></i><span>${name}</span>`;
                    div.onclick = () => {
                        if(Hls.isSupported()){
                            const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                        } else { video.src = url; }
                        document.getElementById('title').innerText = name;
                        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                        div.classList.add('active');
                    };
                    playlist.appendChild(div);
                }
            }
        }
        init();
    </script>
</body>
              </html>
