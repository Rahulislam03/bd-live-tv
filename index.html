<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHUL PRO IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --main: #00ffcc; --bg: #080a0f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        header { padding: 20px; background: #000; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100; text-align: center; }
        .search-bar { width: 80%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; margin-top: 10px; outline: none; }
        
        .player-box { width: 100%; max-width: 900px; margin: 15px auto; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        video { width: 100%; height: 100%; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .item { background: #161b22; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #21262d; transition: 0.3s; }
        .item:hover { transform: translateY(-5px); border-color: var(--main); background: #1c2128; }
        .item img { width: 55px; height: 55px; object-fit: contain; margin-bottom: 10px; border-radius: 8px; }
        .item p { margin: 0; font-size: 13px; font-weight: 600; color: #c9d1d9; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        #loading { padding: 50px; text-align: center; font-size: 18px; color: var(--main); }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">RAHUL <span style="color:var(--main)">TV PRO</span></h2>
    <input type="text" id="search" class="search-bar" placeholder="১০০+ চ্যানেলের মধ্যে খুঁজুন...">
</header>

<div class="player-box">
    <video id="video" controls autoplay playsinline poster="https://i.ibb.co/3S9f4XN/loading.png"></video>
</div>

<div id="loading">চ্যানেল লোড হচ্ছে...</div>
<div class="grid" id="grid"></div>

<script>
    const video = document.getElementById('video');
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const loading = document.getElementById('loading');
    let hls = new Hls();
    let allData = [];

    // ডেটা লোড করা
    async function init() {
        try {
            const res = await fetch('channels.json');
            const data = await res.json();
            allData = data.channels;
            render(allData);
            loading.style.display = 'none';
        } catch (e) {
            loading.innerText = "Error: JSON ফাইল পাওয়া যায়নি!";
        }
    }

    function render(list) {
        grid.innerHTML = "";
        list.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <img src="${ch.logo || 'https://cdn-icons-png.flaticon.com/512/716/716429.png'}" loading="lazy">
                <p>${ch.name}</p>
            `;
            div.onclick = () => play(ch.url);
            grid.appendChild(div);
        });
    }

    function play(url) {
        if (hls) hls.destroy();
        const config = { xhrSetup: xhr => xhr.setRequestHeader("User-Agent", "Toffee (Linux;Android 14)") };

        if (Hls.isSupported()) {
            hls = new Hls(config);
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    search.oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = allData.filter(c => c.name.toLowerCase().includes(val));
        render(filtered);
    };

    init();
</script>
</body>
</html>
