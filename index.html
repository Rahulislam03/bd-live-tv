<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV | @rahulislam03</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #000; --card: #141414; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Roboto', sans-serif; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-size: 30px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        
        /* Player Box */
        .player-container { position: relative; width: 100%; max-width: 900px; margin: 20px auto; aspect-ratio: 16/9; background: #111; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        .watermark { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #ccc; z-index: 10; }

        /* Search Bar */
        .search-box { text-align: center; margin: 20px; }
        #search { width: 80%; max-width: 400px; padding: 12px; border-radius: 25px; border: none; outline: none; background: #333; color: white; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; text-align: center; padding: 10px; }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; background: #1a1a1a; border-radius: 5px; }
        .card p { margin: 0; font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
    </style>
</head>
<body>

<header><div class="logo">BD LIVE TV</div></header>

<div class="player-container">
    <div class="watermark">@rahulislam03</div>
    <video id="video" controls autoplay playsinline></video>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search 100+ Channels...">
</div>

<div class="grid" id="grid"></div>

<script>
    const video = document.getElementById('video');
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    let hls = new Hls();
    let allChannels = [];

    async function load() {
        try {
            const res = await fetch('channels.json');
            const data = await res.json();
            allChannels = data.channels;
            display(allChannels);
        } catch (e) { console.error("JSON load error"); }
    }

    function display(list) {
        grid.innerHTML = "";
        list.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'card';
            // Image link thik thakle ekhane asbe
            div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150x80?text=No+Logo'"><p>${ch.name}</p>`;
            div.onclick = () => {
                if (hls) hls.destroy();
                hls = new Hls({ xhrSetup: xhr => xhr.setRequestHeader("User-Agent", "Toffee") });
                hls.loadSource(ch.url); hls.attachMedia(video);
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            grid.appendChild(div);
        });
    }

    search.oninput = (e) => {
        const val = e.target.value.toLowerCase();
        display(allChannels.filter(c => c.name.toLowerCase().includes(val)));
    };
    load();
</script>
</body>
</html>
